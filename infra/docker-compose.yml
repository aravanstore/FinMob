version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: meridian_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       meridian
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: meridian_api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT:        3000
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     meridian
      DB_USER:     postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
    ports:
      - "3000:3000"

volumes:
  pgdata:
