name: meridian_mobile
description: Meridian Systems — клиентское приложение для заёмщиков
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP запросы к API
  dio: ^5.3.3

  # Хранение токена на устройстве
  flutter_secure_storage: ^10.0.0

  # Навигация
  go_router: ^12.1.1

  # Состояние
  provider: ^6.1.1

  # Filesystem paths
  path_provider: ^2.1.5

  # QR-код
  qr_flutter: ^4.1.0

  # Иконки
  cupertino_icons: ^1.0.2

  # Форматирование дат
  intl: ^0.20.2
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.5
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
