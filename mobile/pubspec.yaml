name: meridian_mobile
description: Meridian Systems — клиентское приложение для заёмщиков
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP запросы к API
  dio: ^5.3.3

  # Хранение токена на устройстве
  flutter_secure_storage: ^10.0.0

  # Навигация
  go_router: ^12.1.1

  # Состояние
  provider: ^6.1.1

  # Filesystem paths
  path_provider: ^2.1.5

  # QR-код
  qr_flutter: ^4.1.0

  # Иконки
  cupertino_icons: ^1.0.2

  # Форматирование дат
  intl: ^0.20.2
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.5
  local_auth: ^3.0.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.2
  google_mlkit_text_recognition: ^0.15.1
  nfc_manager: ^3.3.0
  pointycastle: ^4.0.0
  crypto: ^3.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
